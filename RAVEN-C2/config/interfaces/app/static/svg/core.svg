<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <radialGradient id="coreGlow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="1"/>
      <stop offset="45%" stop-color="#e53935" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7f0000" stop-opacity="1"/>
    </radialGradient>

    <radialGradient id="coreShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e53935" stop-opacity="0"/>
      <stop offset="70%" stop-color="#b71c1c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>

    <radialGradient id="coreSpecular" cx="34%" cy="30%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="electronGrad1" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>

    <radialGradient id="electronGrad2" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>

    <radialGradient id="electronGrad3" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ff8a80"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>

    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="electronBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <filter id="orbitShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#e53935" flood-opacity="0.3"/>
    </filter>

    <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53935" stop-opacity="0.15"/>
      <stop offset="30%" stop-color="#e53935" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff6b6b" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#e53935" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e53935" stop-opacity="0.15"/>
    </linearGradient>

    <linearGradient id="orbitGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c62828" stop-opacity="0.1"/>
      <stop offset="30%" stop-color="#e53935" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ff5252" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#e53935" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c62828" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="orbitGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b71c1c" stop-opacity="0.1"/>
      <stop offset="30%" stop-color="#e53935" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#e53935" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b71c1c" stop-opacity="0.1"/>
    </linearGradient>

    <ellipse id="orbitPath1" cx="100" cy="100" rx="72" ry="26"/>
    <ellipse id="orbitPath2" cx="100" cy="100" rx="72" ry="26"/>
    <ellipse id="orbitPath3" cx="100" cy="100" rx="72" ry="26"/>

  </defs>

  <ellipse cx="100" cy="167" rx="42" ry="6" fill="#e53935" opacity="0.12" filter="url(#softBlur)"/>

  <g transform="translate(100,100)">

    <g transform="rotate(0)" opacity="0.18">
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="#e53935" stroke-width="1"/>
    </g>
    <g transform="rotate(60)" opacity="0.18">
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="#e53935" stroke-width="1"/>
    </g>
    <g transform="rotate(120)" opacity="0.18">
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="#e53935" stroke-width="1"/>
    </g>

    <g transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5.5s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="url(#orbitGrad1)" stroke-width="1.5" filter="url(#orbitShadow)"/>
    </g>

    <g transform="rotate(60)">
      <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="7s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="url(#orbitGrad2)" stroke-width="1.5" filter="url(#orbitShadow)"/>
    </g>

    <g transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" from="120" to="-240" dur="9s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="url(#orbitGrad3)" stroke-width="1.5" filter="url(#orbitShadow)"/>
    </g>

  </g>

  <circle cx="100" cy="100" r="22" fill="#1a0000" opacity="0.6"/>
  <circle cx="100" cy="100" r="19" fill="url(#coreGlow)" filter="url(#outerGlow)"/>
  <circle cx="100" cy="100" r="19" fill="url(#coreShadow)"/>
  <circle cx="100" cy="100" r="19" fill="url(#coreSpecular)"/>
  <circle cx="100" cy="100" r="10" fill="#e53935" opacity="0.08">
    <animate attributeName="r" values="10;14;10" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#electronBloom)">

    <circle r="5.5" fill="url(#electronGrad1)">
      <animateMotion dur="5.5s" repeatCount="indefinite">
        <mpath href="#orbitPath1"/>
      </animateMotion>
      <animate attributeName="r" values="5.5;6.5;5.5" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="5.5" fill="url(#electronGrad1)" opacity="0.6">
      <animateMotion dur="5.5s" repeatCount="indefinite" begin="2.75s">
        <mpath href="#orbitPath1"/>
      </animateMotion>
    </circle>

    <g transform="translate(100,100) rotate(60) translate(-100,-100)">
      <circle r="5" fill="url(#electronGrad2)">
        <animateMotion dur="7s" repeatCount="indefinite">
          <mpath href="#orbitPath2"/>
        </animateMotion>
        <animate attributeName="r" values="5;6;5" dur="7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(100,100) rotate(120) translate(-100,-100)">
      <circle r="4.5" fill="url(#electronGrad3)">
        <animateMotion dur="9s" repeatCount="indefinite">
          <mpath href="#orbitPath3"/>
        </animateMotion>
        <animate attributeName="r" values="4.5;5.5;4.5" dur="9s" repeatCount="indefinite"/>
      </circle>
    </g>

  </g>

  <circle cx="100" cy="100" r="38" fill="none" stroke="#e53935" stroke-width="0.5" opacity="0.12">
    <animate attributeName="r" values="38;44;38" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.04;0.12" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#e53935" stroke-width="0.4" opacity="0.07">
    <animate attributeName="r" values="50;58;50" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.07;0.02;0.07" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>

</svg>

# server general configuration
server.host = 0.0.0.0
server.port = 4444

# listener mode
# multi        - accept all non-TLS (raw shell, RAVEN agent, HTTP beacon)
# http         - HTTP beacon only
# https        - HTTPS beacon only (TLS, no client cert)
# tls          - RAVEN agent over TLS (no client cert)
# mtls         - RAVEN agent over mTLS (client cert required)
# fmtls        - full mTLS TCP + HTTPS beacon
# raw          - raw TCP reverse shell only
server.mode = multi

# default web mode configuration
web.host = 127.0.0.1
web.port = 5000
web.template.dir = config/interfaces/app/templates
web.static.dir = config/interfaces/app/static

# HTTP/HTTPS beacon port (-1 to disable)
web.beacon.port = -1

# teamserver API port for multi operator mode
teamserver.port = 40000

# user interfaces mode
mode.interface = cli

# certificates keystore
cert.keystore.type = PKCS12
cert.keystore.password = R4V3NKEYP4SSX
cert.keystore.path = certs/server.p12

# certificates truststore
cert.truststore.type = PKCS12
cert.truststore.password = R4V3NTRUST5TOR3P455X
cert.truststore.path = certs/truststore.p12

# agent certificates directory
cert.agent.dir = certs/agents

# certificates subject DN - SERVER
cert.dn.cn = R4VEN
cert.dn.o = Emperor Security
cert.dn.ou = Emp3ror
cert.dn.l = DeepInTheSys
cert.dn.st = Los Angeles
cert.dn.c = US

# certificates subject DN - CA
cert.ca.dn.cn = R4VEN
cert.ca.dn.o = Emperor Security
cert.ca.dn.ou = Emp3ror
cert.ca.dn.l = DeepInTheSys
cert.ca.dn.st = Los Angeles
cert.ca.dn.c = US

# certificates validity
cert.server.validity.days = 365
cert.agent.validity.days = 90
cert.ca.validity.days = 3650

# certificates security protocol
# TLSv1.1 | TLSv1.2 | TLSv1.3
cert.tls.protocol = TLSv1.2

# agent handler
agent.connection.timeout = 10000
agent.command.timeout = 30000
agent.max.connections = 100
agent.buffer.size = 8192

# logging
# debug level: INFO | DEBUG | VERBOSE | WARN | ERROR
logging.level = INFO
logging.verbose = true
logging.max.entries = 10000
logging.file = logs/raven.log
logging.file.enabled = true

# database (teamserver)
# database type       : none | postgresql | mongodb
# PostgreSQL          : jdbc:postgresql://host:5432/dbname
# MongoDB             : mongodb://host:27017
db.type = sqlite
db.url = jdbc:postgresql://localhost:5432/ravenc2

# database
# database backend:
# sqlite = local database (recommended)
# postgresql = PostgreSQL server
# mongodb = MongoDB server
# none = In-memory only
db.type = none

# SQLite database path
db.path = database

# PostgreSQL configuration

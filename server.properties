# Raven Framework Configuration

# Listener

# Bind address for the TCP listener (agents connect here)
server.host=0.0.0.0

# TCP port agents connect to
server.port=4444

# Listener mode:
# multi  = Accepts raw shells, Raven agents, and HTTP beacons (no TLS)
# raw    = Raw reverse shells only
# tls    = Raven agent over TLS
# mtls   = Raven agent over mutual TLS (recommended)
# fmtls  = Full mutual TLS on TCP and HTTPS beacon
# http   = HTTP beacon only
# https  = HTTPS beacon only
server.mode=multi

# Bind address for the web panel
web.host=0.0.0.0

# Web panel port (WebApp mode)
web.port=5000

# HTTP beacon port for multi/fmtls mode (-1 disables beacon)
web.beacon.port=-1

# TeamServer

# TeamServer web panel port
# Default credentials: admin / admin
teamserver.port=5001

# Interface

# Default interface when no CLI flag is provided:
# web = Web panel without authentication
# teamserver = Web panel with authentication
# cli = Terminal interface
# cli-teamserver = Terminal interface with authentication
# gui = JavaFX interface
# gui-teamserver = JavaFX interface with authentication
mode.interface=cli

# TLS Certificates

# Generate certificates using:
# java -jar target/raven.jar --init-certs

cert.keystore.path=certs/server.p12
cert.keystore.password=raven
cert.truststore.path=certs/truststore.jks
cert.ca.path=certs/ca.p12
cert.ca.password=raven
cert.agent.dir=certs/agents

# Minimum supported TLS version
cert.tls.protocol=TLSv1.3

# Agent certificate validity (days)
cert.agent.validity.days=90

# Database

# Database backend:
# sqlite = Local database (recommended)
# postgresql = PostgreSQL server
# mongodb = MongoDB server
# none = In-memory only
db.type=none

# SQLite database path
db.path=Database

# PostgreSQL configuration
db.url=jdbc:postgresql://localhost:5432/raven
db.name=raven
db.user=raven
db.password=raven

# MongoDB configuration
db.mongo.uri=mongodb://localhost:27017
db.mongo.name=raven

# Agent

# Command timeout (milliseconds)
agent.command.timeout=120000

# Connection timeout (milliseconds)
agent.connection.timeout=10000

# Socket read buffer size (bytes)
agent.buffer.size=8192

# Logging

# Log level:
# INFO
# DEBUG
# VERBOSE
# WARN
# ERROR
logging.level=INFO

# Enable verbose logging
logging.verbose=false

# Write logs to file
logging.file.enabled=true
logging.file.path=logs/raven.log

# Maximum log entries stored in memory
logging.max.entries=1000

# Operator chat logging
logging.operator.chat=true
logging.operator.chat.limit=500

# Command history
logging.command.history=true
logging.command.history.limit=1000

# Default Administrator

# Change these before deployment
admin.username=admin
admin.password=password
admin.role=SUPER
